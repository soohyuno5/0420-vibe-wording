<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명언 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="quote-card">
            <header>
                <h1>오늘의 명언</h1>
                <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="테마 전환">
                    <span class="theme-icon">☀️</span>
                </button>
            </header>

            <section class="quote-content">
                <blockquote class="quote-text">
                    "클릭하여 오늘의 명언을 시작하세요"
                </blockquote>
                <cite class="quote-author">
                    - 명언 생성기
                </cite>
            </section>

            <footer class="quote-actions">
                <button class="new-quote-btn" id="newQuoteBtn">
                    새 명언 보기
                </button>
            </footer>
        </main>
    </div>

    <footer class="page-footer">
        <div class="date-display" id="dateDisplay">
            2026년 4월 21일 화요일
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
